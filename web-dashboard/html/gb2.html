<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shutdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #000;
    font-family: "Courier New", monospace;
    color: #ff4444;
    height: 100vh;
    overflow: hidden;
}

/* BIOS Flicker */
#flicker {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    animation: flicker 0.15s linear 1;
}

@keyframes flicker {
    0% { opacity: 0; }
    20% { opacity: 1; }
    40% { opacity: 0; }
    60% { opacity: 1; }
    100% { opacity: 0; }
}

/* Shutdown log */
#shutdown {
    padding: 40px;
    font-size: 1.4rem;
    line-height: 1.6rem;
    white-space: pre-wrap;
}

/* Final Screen */
#final {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

#final img {
    width: 250px;
    margin-bottom: 2rem;
    animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

h1 {
    font-size: 5rem;
    color: #ff4444;
    text-shadow: 0 0 20px #ff2222;
    margin-bottom: .5em;
}

h2 {
    font-size: 2.5rem;
    color: #ff4444;
    text-shadow: 0 0 15px #aa0000;
    margin-bottom: 2em;
}

.bottom {
    margin-top: 40px;
    font-size: 1.8rem;
    color: #888;
    letter-spacing: 3px;
}

/* Scanlines */
.scanlines {
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 2px,
        transparent 2px,
        transparent 4px
    );
}
</style>
</head>

<body>

<div id="flicker"></div>
<div id="shutdown"></div>

<!-- FINAL SHUTDOWN SCREEN -->
<div id="final">
    <img class="logo" src="https://tanum-launcher.tcsoc.net/files/ico/gb.ico" alt="Tanum Consult Logo">
    <h1>Out of Order</h1>
    <h2>Tanum Consult – Managed IT Security</h2>

    <div class="bottom">
        Shutdown Successful. <span style="color:#00ffaa;">Feierabend!!!</span>
    </div>
</div>

<div class="scanlines"></div>

<script>
const lines = [
"Stopping user sessions...",
"Disconnecting secure channels...",
"Closing active containers...",
"Container runtime shutting down...",
"Flushing log buffers...",
"Stopping monitoring agents...",
"Metrics pipeline offline...",
"Halting identity services...",
"Authentication backend offline...",
"Unloading access policies...",
"Policy cache cleared...",
"Stopping update services...",
"Disconnecting update channel...",
"Stopping backup daemon...",
"Backup agent idle...",
"Halting orchestration layer...",
"Cluster signals released...",
"Disabling service discovery...",
"Gateway shutdown sequence...",
"API gateway offline...",
"Closing dashboards...",
"Dashboard cache flushed...",
"UI services stopping...",
"UI renderer offline...",
"Preparing system halt...",
"Saving runtime state...",
"State saved successfully.",
"Terminating event listeners...",
"Event registry offline...",
"Stopping log forwarder...",
"Audit daemon terminated...",
"Releasing memory buffers...",
"Memory controller idle...",
"Unmounting filesystems...",
"Synced and unmounted.",
"Halting network interfaces...",
"LAN link terminated.",
"Stopping firewall engine...",
"Firewall offline.",
"Unloading kernel security modules...",
"Security stack removed.",
"Stopping entropy services...",
"Entropy pool frozen.",
"Halting CPU scheduler...",
"Scheduler idle.",
"Stopping kernel tasks...",
"Kernel tasks ended.",
"Preparing CPU halt...",
"Preparing power management...",
"Finalizing shutdown...",
"All services offline.",
"System security level: SAFE",
"Terminating system processes...",
"Core services offline...",
"Final shutdown command executed.",
"System is now halted."
];

let i = 0;
const shutdownBox = document.getElementById("shutdown");

function nextLine() {
    if (i < lines.length) {
        shutdownBox.textContent += lines[i] + "\n";
        i++;
        setTimeout(nextLine, 1000);
    } else {
        document.getElementById("final").style.opacity = 1;
    }
}

setTimeout(nextLine, 200);
</script>

</body>
</html>
