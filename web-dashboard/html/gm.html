<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>gm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: "Courier New", monospace;
            color: #00ff9c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            font-size: 5rem;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 0.5em;
        }

        h2 {
            font-size: 2.5rem;
            color: #44aaff;
            text-shadow: 0 0 15px #2288ff;
            margin-bottom: 2em;
        }

        .logo {
            width: 250px;
            height: auto;
            margin-bottom: 2rem;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .bottom-text {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 1.8rem;
            color: #888;
            letter-spacing: 3px;
        }

        .scanlines {
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.15) 0px,
                    rgba(0, 0, 0, 0.15) 2px,
                    transparent 2px,
                    transparent 4px);
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="logo" src="https://tanum-launcher.tcsoc.net/files/ico/gb.ico" alt="Tanum Consult Logo">
        <h1>Good Morning</h1>
        <h2>Tanum Consult – Managed IT Security</h2>
    </div>

    <div class="bottom-text">
        Systems Online. <span style="color:#00ffaa;">Ready for Operation.</span>
    </div>

    <div class="scanlines"></div>
</body>

</html>
