<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Essen in den Ofen – Tanum Consult</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #0c0c0c;
        font-family: "Courier New", monospace;
        color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        text-align: center;
        animation: fadeIn 2s ease-out forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to   { opacity: 1; transform: scale(1); }
    }

    .logo {
        width: 200px;
        height: auto;
        margin-bottom: 2.5rem;
        filter: drop-shadow(0 0 10px #ff6600);
        animation: pulse 4s infinite ease-in-out;
    }

    @keyframes pulse {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.07); }
        100% { transform: scale(1); }
    }

    h1 {
        font-size: 4rem;
        color: #ff8800;
        text-shadow: 0 0 20px #ff6600;
        margin-bottom: 1.5rem;
    }

    /* Minimalistischer Ofen mit Blech (SVG) */
    .icon {
        width: 300px;
        height: 300px;
        margin: 2rem auto;
        filter: drop-shadow(0 0 12px #ffaa44);
    }

    .scanlines {
        pointer-events: none;
        position: absolute;
        top:0;left:0;
        width:100%;height:100%;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.03) 0px,
            rgba(255,255,255,0.03) 2px,
            rgba(0,0,0,0) 2px,
            rgba(0,0,0,0) 4px
        );
    }
</style>
</head>
<body>

<div class="container">

    <!-- Firmenlogo -->
    <img class="logo" src="https://tanum-launcher.tcsoc.net/files/ico/gb.ico" alt="Logo">

    <h1>Essen in den Ofen</h1>

    <!-- Ofen-Icon -->
    <svg class="icon" viewBox="0 0 512 512">
        <!-- Ofenrahmen -->
        <rect x="96" y="80" width="320" height="320" rx="20" fill="#ffaa33"/>
        
        <!-- Türfenster -->
        <rect x="140" y="150" width="232" height="180" rx="15" fill="#0c0c0c"/>

        <!-- Backblech -->
        <rect x="170" y="200" width="172" height="70" rx="8" fill="#ffaa33"/>

        <!-- Bedienpanel -->
        <circle cx="200" cy="120" r="12" fill="#0c0c0c"/>
        <circle cx="256" cy="120" r="12" fill="#0c0c0c"/>
        <circle cx="312" cy="120" r="12" fill="#0c0c0c"/>
    </svg>

</div>

<div class="scanlines"></div>

</body>
</html>
