<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>gm</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #000;
    font-family: "Courier New", monospace;
    color: #00ff9c;
    height: 100vh;
    overflow: hidden;
}

#flicker {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    animation: flicker 0.15s linear 1;
}

@keyframes flicker {
    0% { opacity: 0; }
    20% { opacity: 1; }
    40% { opacity: 0; }
    60% { opacity: 1; }
    100% { opacity: 0; }
}

#boot {
    padding: 40px;
    font-size: 1.4rem;
    line-height: 1.6rem;
    white-space: pre-wrap;
}

#final {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

#final img {
    width: 250px;
    margin-bottom: 2rem;
}

h1 {
    font-size: 5rem;
    text-shadow: 0 0 20px #00ffcc;
    margin: 0 0 0.5em 0;
}

h2 {
    font-size: 2.5rem;
    color: #44aaff;
    text-shadow: 0 0 15px #2288ff;
}

.bottom {
    margin-top: 40px;
    font-size: 1.8rem;
    color: #888;
    letter-spacing: 3px;
}

.scanlines {
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 2px,
        transparent 2px,
        transparent 4px
    );
}
</style>
</head>

<body>

<div id="flicker"></div>
<div id="boot"></div>

<div id="final">
    <img src="https://tanum-launcher.tcsoc.net/files/ico/gb.ico" alt="Tanum Consult Logo">
    <h1>Good Morning</h1>
    <h2>Tanum Consult – Managed IT Security</h2>
    <div class="bottom">
        Systems Online. <span style="color:#00ffaa;">Ready for Operation.</span>
    </div>
</div>

<div class="scanlines"></div>

<script>
const lines = [
"Initializing system firmware...",
"Loading hardware abstraction layer...",
"Checking CPU microcode...",
"Initializing memory controller...",
"Memory check: OK",
"Detecting storage devices...",
"NVMe controller online...",
"Mounting encrypted root filesystem...",
"Filesystem integrity check OK",
"Initializing kernel scheduler...",
"Loading security modules...",
"Firewall ruleset applied...",
"Starting entropy services...",
"Initializing network interfaces...",
"Link established: LAN",
"Synchronizing system clock...",
"NTP sync successful",
"Loading container runtime...",
"Starting container services...",
"Container network ready",
"Initializing logging subsystem...",
"Audit daemon active",
"Starting monitoring agents...",
"Metrics pipeline online",
"Initializing identity services...",
"Authentication backend ready",
"Loading access policies...",
"Policy verification OK",
"Starting update services...",
"Update channel reachable",
"Initializing backup agent...",
"Backup state verified",
"Starting orchestration layer...",
"Cluster membership verified",
"Service discovery active",
"Initializing API gateway...",
"Gateway online",
"Loading dashboards...",
"Dashboard cache warm",
"Initializing UI services...",
"Rendering interface layers...",
"Preparing user environment...",
"Applying system preferences...",
"Checking operational status...",
"All services responding",
"Running final diagnostics...",
"Diagnostics passed",
"System security level: GREEN",
"Operational readiness check...",
"Preparing handover to UI...",
"Finalizing startup sequence...",
"System startup complete."
];

let i = 0;
const boot = document.getElementById("boot");

function nextLine() {
    if (i < lines.length) {
        boot.textContent += lines[i] + "\n";
        i++;
        setTimeout(nextLine, 1000);
    } else {
        document.getElementById("final").style.opacity = 1;
    }
}

setTimeout(nextLine, 200);
</script>

</body>
</html>
