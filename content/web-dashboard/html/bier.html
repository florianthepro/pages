<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>drinks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: "Courier New", monospace;
            color: #00ff9c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 5rem;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 0.5em;
        }

        h2 {
            font-size: 2.5rem;
            color: #ffaa33;
            text-shadow: 0 0 15px #ff8800;
            margin-bottom: 2em;
        }

        .logo {
            width: 250px;
            height: auto;
            margin-bottom: 2rem;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Getränke-Icon */
        .icon {
            width: 260px;
            height: 260px;
            margin: 2rem auto;
            filter: drop-shadow(0 0 12px #ffaa44);
        }

        .scanlines {
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 2px,
                transparent 2px,
                transparent 4px
            );
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Firmenlogo -->
      <img class="logo" src="https://tanum-launcher.tcsoc.net/files/ico/gb.ico" alt="Logo">

        <h1>Getränke auffüllen</h1>
        <h2>Tanum Consult – Managed IT Security</h2>

        <!-- Getränke-Icon: Getränkekiste mit Flaschen -->
        <svg class="icon" viewBox="0 0 512 512">
            <!-- Kiste -->
            <rect x="80" y="200" width="352" height="200" rx="20" fill="#ffaa33"/>
            <rect x="110" y="230" width="292" height="140" rx="10" fill="#0c0c0c"/>

            <!-- Flaschen -->
            <rect x="140" y="150" width="40" height="120" rx="10" fill="#ffaa33"/>
            <rect x="200" y="150" width="40" height="120" rx="10" fill="#ffaa33"/>
            <rect x="260" y="150" width="40" height="120" rx="10" fill="#ffaa33"/>
            <rect x="320" y="150" width="40" height="120" rx="10" fill="#ffaa33"/>

            <!-- Flaschenhälse -->
            <rect x="152" y="130" width="16" height="30" rx="5" fill="#ffaa33"/>
            <rect x="212" y="130" width="16" height="30" rx="5" fill="#ffaa33"/>
            <rect x="272" y="130" width="16" height="30" rx="5" fill="#ffaa33"/>
            <rect x="332" y="130" width="16" height="30" rx="5" fill="#ffaa33"/>
        </svg>
    </div>

    <div class="scanlines"></div>
</body>

</html>
